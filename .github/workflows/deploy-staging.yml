name: Deploy ToyChart App to Staging

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & Build Frontend
        run: |
          cd frontend/toy-chart-frontend
          npm install
          npm run build

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Deploy to Staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_STAGING_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_STAGING_PUBLISH_PROFILE }}
          package: backend